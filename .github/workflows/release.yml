name: Release to npm

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - run: |
          git fetch origin main
          git checkout main

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'latest'
          registry-url: 'https://registry.npmjs.org/'

      - run: npm ci

      - name: Version
        id: extract
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          package="${tag%@*}"
          version="${tag##*@}"
          if [[ "$version" =~ -([a-z]+)\. ]]; then
            prerelease="${BASH_REMATCH[1]}"
            npmtag="${prerelease^}"
          else
            npmtag="latest"
          fi

          {
            echo "package=$package"
            echo "version=$version"
            echo "npmtag=$npmtag"
          } >> "$GITHUB_OUTPUT"

          npm version "$version" -w "$package" --no-git-tag-version

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git add .
          git commit -am "chore: release ${{ steps.extract.outputs.package }}@${{ steps.extract.outputs.version }}"
          git push

      - name: Publish
        run: npm publish --provenance --tag ${{ steps.extract.outputs.npmtag }} -w ${{ steps.extract.outputs.package }}
